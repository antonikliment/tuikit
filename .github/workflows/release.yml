name: Release

# Tag a release (e.g. git tag v0.1.0 && git push --tags). The GitHub release is
# only created if lint AND test pass on the tagged commit.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint run

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: go test
        run: go test -race ./...

  release:
    name: Release
    needs: [lint, test] # release fails unless both pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        # Idempotent: if the release already exists (e.g. published from the UI,
        # which creates the tag that triggered this run), treat it as done
        # instead of failing on a duplicate. Only lint + test gate the tag.
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; nothing to do."
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
          fi
